<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Club d'Art Oratoire CAJEC</title>
    <style>
        :root {
            --primary: #d97706;
            --primary-dark: #b45309;
            --bg-dark: #1e1b18;
            --bg-light: #fdfaf7;
            --text-dark: #2d2621;
            --border-color: #e5e1dc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
        }

        /* En-tête / Ticket style */
        .header-ticket {
            background-color: var(--bg-dark);
            color: #fff;
            padding: 30px 20px;
            text-align: center;
            border-bottom: 4px dashed var(--primary);
            position: relative;
        }

        .header-ticket h1 {
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .ticket-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 500px;
            margin: 0 auto;
            font-size: 0.9rem;
            text-align: left;
            border-left: 2px solid var(--primary);
            padding-left: 15px;
        }

        .ticket-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: var(--primary);
            color: #fff;
            padding: 5px 10px;
            font-size: 0.75rem;
            font-weight: bold;
            transform: rotate(5deg);
            border-radius: 3px;
        }

        /* Barre de progression */
        .progress-container {
            max-width: 600px;
            margin: 30px auto 10px auto;
            display: flex;
            justify-content: space-between;
            position: relative;
            padding: 0 10px;
        }

        .progress-container::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 0;
            height: 2px;
            width: 100%;
            background-color: var(--border-color);
            z-index: 1;
        }

        .progress-line {
            position: absolute;
            top: 15px;
            left: 0;
            height: 2px;
            width: 0%;
            background-color: var(--primary);
            z-index: 2;
            transition: width 0.3s ease;
        }

        .step-dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: #fff;
            border: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
            position: relative;
            z-index: 3;
            transition: all 0.3s ease;
        }

        .step-dot.active {
            border-color: var(--primary);
            background-color: var(--primary);
            color: white;
        }

        .step-dot.completed {
            border-color: var(--primary-dark);
            background-color: var(--primary-dark);
            color: white;
        }

        .step-label {
            position: absolute;
            top: 38px;
            font-size: 0.65rem;
            text-transform: uppercase;
            color: #888;
            white-space: nowrap;
        }

        .step-dot.active .step-label {
            color: var(--primary);
            font-weight: bold;
        }

        /* Formulaire */
        .form-container {
            max-width: 600px;
            margin: 40px auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .form-step {
            display: none;
        }

        .form-step.active {
            display: block;
        }

        h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: var(--bg-dark);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="number"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            background-color: #fafafa;
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #fff;
        }

        /* Radio Options corrigés */
        .options-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .radio-label {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            font-weight: normal;
            background-color: #fff;
            transition: background-color 0.2s;
        }

        .radio-label:hover {
            background-color: #fefaf6;
        }

        .radio-label input[type="radio"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
        }

        /* Boutons de navigation */
        .btn-container {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            gap: 15px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            flex: 1;
        }

        button.btn-next {
            background-color: var(--primary);
            color: white;
        }

        button.btn-next:hover {
            background-color: var(--primary-dark);
        }

        button.btn-prev {
            background-color: #e5e1dc;
            color: var(--text-dark);
        }

        button.btn-prev:hover {
            background-color: #d1cbc4;
        }

        .note-text {
            font-size: 0.85rem;
            color: #666;
            margin-top: 15px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <!-- Structure du haut style ticket -->
    <div class="header-ticket">
        <div class="ticket-badge">PASS GRATUIT</div>
        <h1>Club d'Art Oratoire CAJEC</h1>
        <div class="ticket-details">
            <div><strong>DATE :</strong> 18 Juil. 2026</div>
            <div><strong>HEURE :</strong> 16h00</div>
            <div><strong>LIEU :</strong> ESPIM</div>
            <div><strong>ACCÈS :</strong> Badge Pass</div>
        </div>
    </div>

    <!-- Barre de Progression Dynamique -->
    <div class="progress-container">
        <div class="progress-line" id="progress-line"></div>
        <div class="step-dot active" id="dot-1">1<span class="step-label">Infos</span></div>
        <div class="step-dot" id="dot-2">2<span class="step-label">Motiv</span></div>
        <div class="step-dot" id="dot-3">3<span class="step-label">Talents</span></div>
        <div class="step-dot" id="dot-4">4<span class="step-label">Accomp.</span></div>
        <div class="step-dot" id="dot-5">5<span class="step-label">Validation</span></div>
    </div>

    <!-- Conteneur principal du Formulaire lié à FormSubmit -->
    <div class="form-container">
        <form action="https://formsubmit.co" method="POST" id="registrationForm">
            
            <!-- Désactive le captcha par défaut pour fluidifier -->
            <input type="hidden" name="_captcha" value="false">

            <!-- ÉTAPE 1 : Informations personnelles -->
            <div class="form-step active" id="step-1">
                <h2>PARTIE 1 : Informations personnelles</h2>
                
                <div class="form-group">
                    <label>1. Nom et Prénom *</label>
                    <input type="text" name="Nom_Prenom" required>
                </div>

                <div class="form-group">
                    <label>2. Numéro WhatsApp *</label>
                    <input type="tel" name="WhatsApp" placeholder="Ex: 22778404908" required>
                </div>

                <div class="form-group">
                    <label>3. Email (optionnel)</label>
                    <input type="email" name="Email">
                </div>

                <div class="form-group">
                    <label>4. Statut *</label>
                    <div class="options-group">
                        <label class="radio-label"><input type="radio" name="Statut" value="Eleve" required> Élève</label>
                        <label class="radio-label"><input type="radio" name="Statut" value="Etudiant"> Étudiant</label>
                        <label class="radio-label"><input type="radio" name="Statut" value="Professionnel"> Professionnel</label>
                        <label class="radio-label"><input type="radio" name="Statut" value="Autre"> Autre</label>
                    </div>
                </div>

                <div class="form-group">
