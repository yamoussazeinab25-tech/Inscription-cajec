<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club d'Art Oratoire CAJEC</title>
    <style>
        /* Remplissage de l'intégralité de l'écran */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #f7ebd9; /* Votre fond beige d'origine */
            color: #261202;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
        }

        /* En-tête étiré sur toute la largeur */
        .header {
            background-color: #1a1512;
            color: #f4c28d;
            padding: 20px 10px;
            text-align: center;
            border-bottom: 3px dashed #d97d24;
            width: 100%;
            box-sizing: border-box;
        }

        /* Conteneur principal plein écran */
        .container {
            width: 100%;
            max-width: 100%;
            flex: 1;
            padding: 20px 15px;
            box-sizing: border-box;
        }

        /* Barre de progression avec vos cercles d'origine */
        .steps {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
        .step {
            text-align: center;
            font-size: 10px;
            color: #8c7664;
            flex: 1;
        }
        .step-circle {
            width: 24px;
            height: 24px;
            background-color: #e6dacb;
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 5px auto;
        }
        .step.active .step-circle {
            background-color: #d97d24;
        }
        
        /* Sections dynamiques du formulaire */
        .form-part {
            display: none;
            max-width: 500px;
            margin: 0 auto;
        }
        .form-part.active {
            display: block;
        }
        
        .part-title {
            color: #a65b1c;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        h2 {
            font-size: 22px;
            margin-top: 0;
            margin-bottom: 25px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 15px;
        }
        input[type="text"], input[type="email"], input[type="tel"], input[type="number"], textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid #d9cbd5;
            border-radius: 6px;
            box-sizing: border-box;
            background-color: #fff;
            font-size: 16px;
        }
        
        /* Grandes cases de choix d'origine */
        .radio-box {
            display: flex;
            align-items: center;
            padding: 14px;
            border: 1px solid #d9cbd5;
            border-radius: 6px;
            margin-bottom: 12px;
            cursor: pointer;
            background-color: #fff;
        }
        .radio-box input {
            margin-right: 15px;
            width: 20px;
            height: 20px;
        }
        
        /* Vos boutons d'origine pleine largeur */
        .btn-nav {
            background-color: #d97d24;
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            box-sizing: border-box;
        }
        .btn-nav:hover {
            background-color: #b36214;
        }
        .btn-secondary {
            background-color: #e6dacb;
            color: #261202;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h3 style="color: #d97d24; margin: 0; letter-spacing: 1px; font-size: 16px;">CLUB D'ART ORATOIRE CAJEC</h3>
        <p style="margin: 5px 0 0 0; font-size: 12px;">DATE: 18 Juil. 2026 | HEURE: 16h00 | LIEU: ESPIM</p>
    </div>

    <div class="container">
        <!-- BARRE DE PROGRESSION -->
        <div class="steps">
            <div class="step active" id="dot-1"><div class="step-circle">1</div>INFOS</div>
            <div class="step" id="dot-2"><div class="step-circle">2</div>MOTIV</div>
            <div class="step" id="dot-3"><div class="step-circle">3</div>TALENTS</div>
            <div class="step" id="dot-4"><div class="step-circle">4</div>ACCOMP.</div>
            <div class="step" id="dot-5"><div class="step-circle">5</div>VALIDATION</div>
        </div>

        <form action="https://formsubmit.co" method="POST" id="mainForm">
            <input type="hidden" name="_captcha" value="false">

            <!-- PARTIE 1 : INFOS (BUG DU STATUT RÉGULÉ) -->
            <div class="form-part active" id="part-1">
                <div class="part-title">Partie 1</div>
                <h2>Informations personnelles</h2>
                
                <div class="input-group">
                    <label>1. Nom et Prénom *</label>
                    <input type="text" name="Nom_Et_Prenom" required>
                </div>
                <div class="input-group">
                    <label>2. Numéro WhatsApp *</label>
                    <input type="tel" name="WhatsApp" placeholder="Ex: 22778404908" required>
                </div>
                <div class="input-group">
                    <label>3. Email (optionnel)</label>
                    <input type="email" name="Email">
                </div>
                <div class="input-group">
                    <label>4. Statut *</label>
                    <label class="radio-box"><input type="radio" name="Statut" value="Eleve" required> Élève</label>
                    <label class="radio-box"><input type="radio" name="Statut" value="Etudiant"> Étudiant</label>
                    <label class="radio-box"><input type="radio" name="Statut" value="Professionnel"> Professionnel</label>
                    <label class="radio-box"><input type="radio" name="Statut" value="Autre"> Autre</label>
                </div>
                <div class="input-group">
                    <label>5. Âge *</label>
                    <input type="number" name="Age" required>
                </div>
                <div class="input-group">
                    <label>6. Ville de résidence *</label>
                    <input type="text" name="Ville" value="Niamey" required>
                </div>
                
                <button type="button" class="btn-nav" onclick="allerAPartie(2)">Suivant</button>
            </div>

            <!-- PARTIE 2 : MOTIV -->
            <div class="form-part" id="part-2">
                <div class="part-title">Partie 2</div>
                <h2>Motivation & conditions</h2>
                <div class="input-group">
                    <label>7. Pourquoi veux-tu rejoindre le Club d'Art Oratoire ? *</label>
                    <textarea name="Motivation" rows="4" required></textarea>
                </div>
                <button type="button" class="btn-nav" onclick="allerAPartie(3)">Suivant</button>
                <button type="button" class="btn-nav btn-secondary" onclick="allerAPartie(1)">Retour</button>
            </div>

            <!-- PARTIE 3 : TALENTS -->
            <div class="form-part" id="part-3">
                <div class="part-title">Partie 3</div>
                <h2>Talents & Compétences</h2>
                <div class="input-group">
                    <label>8. As-tu déjà une expérience en art oratoire ? *</label>
                    <label class="radio-box"><input type="radio" name="Experience" value="Aucune" required> Aucune, débutant</label>
                    <label class="radio-box"><input type="radio" name="Experience" value="Moyenne"> J'ai quelques bases</label>
                </div>
                <button type="button" class="btn-nav" onclick="allerAPartie(4)">Suivant</button>
                <button type="button" class="btn-nav btn-secondary" onclick="allerAPartie(2)">Retour</button>
            </div>

            <!-- PARTIE 4 : ACCOMPAGNEMENT & CONTRIBUTION -->
            <div class="form-part" id="part-4">
                <div class="part-title">Partie 4</div>
                <h2>Accompagnement & Contribution</h2>
                
                <div class="input-group">
                    <label>17. Souhaites-tu bénéficier d’un accompagnement personnalisé/coaching en plus des séances du club ? *</label>
                    <label class="radio-box"><input type="radio" name="Besoin_Coaching" value="Oui" id="coaching-oui" onchange="gererTarifs()" required> Oui, je suis intéressé(e)</label>
                    <label class="radio-box"><input type="radio" name="Besoin_Coaching" value="Non" id="coaching-non" onchange="gererTarifs()"> Non, le club gratuit me suffit pour le moment</label>
                </div>

                <div id="bloc-tarifs" style="display: none;">
                    <div class="input-group">
                        <label>18. Si oui, quelle est la fourchette de contribution mensuelle que tu peux prévoir ? *</label>
                        <label class="radio-box"><input type="radio" name="Tarif" value="0-12000"> 0 à 12 000 FCFA : Accès base</label>
                        <label class="radio-box"><input type="radio" name="Tarif" value="13000-41000"> 13 000 à 41 000 FCFA : Suivi + 1 séance ind./mois</label>
